services:
  taq-event:
    build: .
    container_name: taq-event
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3000"
    env_file: .env
    environment:
      NODE_ENV: production
      WEB_PORT: "3000"
      GOOGLE_SERVICE_ACCOUNT_KEY_FILE: ./service-account.json
      HTTPS_KEY_FILE: ""
      HTTPS_CERT_FILE: ""
      HTTPS_KEY_PEM: ""
      HTTPS_CERT_PEM: ""
    volumes:
      - ./.bot-state.json:/app/.bot-state.json
      - ./service-account.json:/app/service-account.json:ro
      - ./logs:/app/logs
      - ./crashlog:/app/crashlog
